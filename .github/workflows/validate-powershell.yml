name: Validate PowerShell

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parse-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -File -Include *.ps1,*.psm1,*.psd1
          if (-not $files) {
              Write-Host "No PowerShell files found."
              exit 0
          }

          $failed = $false
          foreach ($file in $files) {
              $tokens = $null
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null
              if ($errors.Count -gt 0) {
                  $failed = $true
                  foreach ($error in $errors) {
                      Write-Host "::error file=$($file.FullName)::$($error.Message)"
                  }
              }
          }

          if ($failed) {
              exit 1
          }

      - name: Run PowerShell tests
        shell: pwsh
        run: |
          $tests = Get-ChildItem -Path .\tests -Filter *.tests.ps1 -File
          if (-not $tests) {
              Write-Host "No PowerShell tests found."
              exit 0
          }

          foreach ($test in $tests) {
              & $test.FullName
          }
